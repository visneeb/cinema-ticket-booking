version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# Cinema Booking System — docker-compose.yml
#
# Start everything with ONE command:
#   docker compose up --build
#
# Services:
#   frontend  :3000  → Vue 3 SPA (nginx)
#   backend   :8080  → Go API (Gin) + WebSocket hub + RabbitMQ worker
#   redis     :6379  → Redis (distributed seat locks, TTL 5m)
#   rabbitmq  :5672  → RabbitMQ 4 (async events)
#              :15672 → RabbitMQ management UI
#
# MongoDB is hosted on Atlas — set MONGO_URI in .env
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Go backend ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./cinema-ticket-booking-server
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      PORT: "8080"
      MONGO_DB: "cinema"
      REDIS_ADDR: "redis:6379"
      RABBITMQ_URL: "amqp://${RABBITMQ_USER}:${RABBITMQ_PASS}@rabbitmq:5672/"
      GOOGLE_APPLICATION_CREDENTIALS: /run/secrets/firebase-sa.json
      CORS_ORIGINS: "${CORS_ORIGINS:-http://localhost:3000}"
    volumes:
      - ./firebase-service-account.json:/run/secrets/firebase-sa.json:ro
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - cinema-net

  # ── Vue 3 frontend (nginx) ───────────────────────────────────────────────────
  frontend:
    build:
      context: ./cinema-ticket-booking-client
      dockerfile: Dockerfile
      args:
        VITE_FIREBASE_API_KEY: ${VITE_FIREBASE_API_KEY}
        VITE_FIREBASE_AUTH_DOMAIN: ${VITE_FIREBASE_AUTH_DOMAIN}
        VITE_FIREBASE_PROJECT_ID: ${VITE_FIREBASE_PROJECT_ID}
        VITE_FIREBASE_STORAGE_BUCKET: ${VITE_FIREBASE_STORAGE_BUCKET}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${VITE_FIREBASE_MESSAGING_SENDER_ID}
        VITE_FIREBASE_APP_ID: ${VITE_FIREBASE_APP_ID}
        VITE_FIREBASE_MEASUREMENT_ID: ${VITE_FIREBASE_MEASUREMENT_ID}
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - cinema-net

  # ── Redis ─────────────────────────────────────────────────────────────────────
  redis:
    image: redis:8
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
    networks:
      - cinema-net

  # ── RabbitMQ ──────────────────────────────────────────────────────────────────
  rabbitmq:
    image: rabbitmq:4-management
    ports:
      - "5672:5672" # AMQP
      - "15672:15672" # Management UI → http://localhost:15672
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS}
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    restart: unless-stopped
    networks:
      - cinema-net

# ── Named volumes ─────────────────────────────────────────────────────────────
volumes:
  redis_data:
  rabbitmq_data:

# ── Internal network (services talk by name, not localhost) ───────────────────
networks:
  cinema-net:
    driver: bridge
